name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import smoke test
        run: |
          python -c "
          from graphite import (
              Claim, ClaimStore, Provenance, ConfidenceScorer,
              NodeRef, EvidencePacket, BaseFetcher, BaseExtractor,
              DomainSpec, BaseRuleEngine,
          )
          print('✅ All public API imports OK')
          print(f'   version: {__import__(\"graphite\").__version__}')
          "

      - name: Run tests
        run: pytest -v

      - name: Evidence accumulation example
        run: python examples/evidence_accumulation/run.py

      - name: Lineage override demo
        run: python examples/lineage_override_demo/run.py
